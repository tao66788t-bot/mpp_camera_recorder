# ============================================================
#  Camera Recorder 配置文件
#  用法: ./camera_recorder -path /etc/camera_recorder.conf
# ============================================================

# ---- 测试控制 ----
test_duration = 30          # 录制时长（秒），0=直到Ctrl+C停止

# ---- VI 摄像头参数 ----
vi_dev      = 0             # VI 设备号
vi_width    = 1920          # 采集宽度
vi_height   = 1080          # 采集高度
vi_fps      = 25            # 帧率
vi_pixfmt   = nv21          # 像素格式: nv21/nv12/yv12/yu12/aw_lbc_2_5x
vi_buf_num  = 6             # V4L2 buffer 数量
vi_wdr      = 0             # 宽动态: 0=关闭 1=开启

# ---- VENC 编码参数 ----
venc_encoder = H.264        # 编码格式: H.264 / H.265 / MJPEG
venc_width   = 1920         # 编码输出宽度
venc_height  = 1080         # 编码输出高度
venc_fps     = 25           # 输出帧率
venc_bitrate = 2000000      # 码率 (bps): 2000000=2Mbps
venc_rc_mode = 0            # 码率控制: 0=CBR 1=VBR 2=FIXQP 3=ABR
venc_init_qp = 30           # 初始QP
venc_gop_size = 25          # GOP大小 (帧率=关键帧间隔)
venc_fast_enc = 1           # 快速编码: 0=关闭 1=开启

# ---- MUX 输出参数 ----
mux_output_dir    = /tmp               # 输出目录
mux_output_prefix = camera_rec         # 文件名前缀 → camera_rec_1.mp4
mux_max_duration  = 0                  # 单个文件最大时长(秒)，0=不限制
mux_max_files     = 0                  # 最大文件数，0=不限制
mux_add_repair_info = 0               # 添加修复信息: 0=不添加 1=添加
